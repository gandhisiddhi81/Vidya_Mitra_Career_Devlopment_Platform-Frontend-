services:
  - type: web
    name: vidya-mitra-frontend
    env: docker
    repo: https://github.com/gandhisiddhi81/Vidya_Mitra_Career_Devlopment_Platform-Frontend-.git
    rootDir: .
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: VITE_API_BASE
        value: https://vidya-mitra-backend.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

